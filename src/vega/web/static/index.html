<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Vega</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
  h1 { font-size: 1.4rem; }
  #run-btn { padding: 0.6rem 1.2rem; font-size: 1rem; cursor: pointer; }
  #run-btn:disabled { cursor: default; opacity: 0.6; }
  #status-line { margin: 1rem 0; font-family: monospace; }
  #log-tail { background: #f5f5f5; padding: 0.75rem; font-family: monospace; font-size: 0.85rem;
              max-height: 260px; overflow-y: auto; white-space: pre-wrap; border-radius: 4px; }
  select { font-size: 0.95rem; padding: 0.3rem; }
  table { border-collapse: collapse; margin: 0.5rem 0; width: 100%; }
  th, td { border: 1px solid #ddd; padding: 0.35rem 0.6rem; font-size: 0.9rem; text-align: left; }
  th { background: #fafafa; }
  hr { border: none; border-top: 1px solid #ddd; margin: 1rem 0; }
  #briefing { margin-top: 1.5rem; }
  .dim { color: #777; }
</style>
</head>
<body>
  <h1>Vega</h1>

  <button id="run-btn">Run pipeline now</button>
  <div id="status-line" class="dim">idle</div>
  <pre id="log-tail" style="display:none"></pre>

  <hr>

  <label>Briefing: <select id="date-picker"></select></label>
  <div id="briefing"></div>

<script>
const runBtn = document.getElementById('run-btn');
const statusLine = document.getElementById('status-line');
const logTail = document.getElementById('log-tail');
const datePicker = document.getElementById('date-picker');
const briefingDiv = document.getElementById('briefing');
let polling = null;

async function refreshStatus() {
  const res = await fetch('/api/status');
  const s = await res.json();
  if (s.state === 'idle') {
    statusLine.textContent = 'idle';
    logTail.style.display = 'none';
    runBtn.disabled = false;
    return s;
  }
  if (s.state === 'external') {
    statusLine.textContent = 'a scheduled/external run is in progress — Run is disabled' +
      (s.last_run ? ` (last web run: ${s.last_run})` : '');
    logTail.style.display = 'none';
    runBtn.disabled = true;
    return s;
  }
  runBtn.disabled = (s.state === 'running');
  statusLine.textContent = `${s.state} — run ${s.run_id} started ${s.started_at}` +
    (s.finished_at ? ` finished ${s.finished_at} (exit ${s.returncode})` : '');
  logTail.style.display = 'block';
  logTail.textContent = s.log_tail || '';
  return s;
}

function startPolling() {
  if (polling) return;
  polling = setInterval(async () => {
    const s = await refreshStatus();
    if (s.state !== 'running' && s.state !== 'external') {
      clearInterval(polling);
      polling = null;
      await loadBriefingList();
    }
  }, 2000);
}

runBtn.addEventListener('click', async () => {
  runBtn.disabled = true;
  try {
    const res = await fetch('/api/run', { method: 'POST', headers: { 'X-Vega-Run': '1' } });
    const body = await res.json();
    if (!res.ok) {
      statusLine.textContent = `refused (${res.status}): ${body.error}`;
      runBtn.disabled = false;
      return;
    }
    startPolling();
    refreshStatus();
  } catch (err) {
    statusLine.textContent = `request failed: ${err}`;
    runBtn.disabled = false;
  }
});

async function loadBriefingList() {
  const res = await fetch('/api/briefings');
  const dates = await res.json();
  const prev = datePicker.value;
  datePicker.innerHTML = '';
  for (const d of dates) {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    datePicker.appendChild(opt);
  }
  if (dates.length) {
    datePicker.value = dates.includes(prev) ? prev : dates[dates.length - 1];
    await loadBriefing(datePicker.value);
  }
}

async function loadBriefing(date) {
  if (!date) { briefingDiv.innerHTML = ''; return; }
  const res = await fetch(`/api/briefings/${date}`);
  if (!res.ok) { briefingDiv.innerHTML = '<p class="dim">not found</p>'; return; }
  const body = await res.json();
  briefingDiv.innerHTML = body.html;
}

datePicker.addEventListener('change', () => loadBriefing(datePicker.value));

(async () => {
  const s = await refreshStatus();
  if (s.state === 'running') startPolling();
  await loadBriefingList();
})();
</script>
</body>
</html>
